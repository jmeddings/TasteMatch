# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: tastematch
# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
app: taste-match
service: tastematch-api

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  memorySize: 512
  timeout: 30

  httpApi:
    cors:
      allowedOrigins:
        - ${env:AMPLIFY_APP_ORIGIN, 'http://localhost:5173'}
        - http://localhost:5173
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true

  environment:
    SECRETS_ID: ${env:SECRETS_ID, ''}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource:
            - arn:aws:secretsmanager:${aws:region}:${aws:accountId}:secret:${env:SECRETS_ID, '*'}

functions:
  api:
    handler: src/lambda.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: '*'

plugins:
  - serverless-offline

package:
  patterns:
    - ../docs/openapi.yaml
